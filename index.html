<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>상품 등록 · 스마트스토어</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{--naver-green:#03c75a;--naver-green-dark:#02b350;--naver-green-soft:#e8f8ef;--text-primary:#1e1e23;--text-secondary:#767678;--border:#e4e4e7;--bg-page:#f5f6f8;--bg-card:#ffffff;--shadow:0 1px 3px rgba(0,0,0,0.06);--radius:8px;--radius-sm:4px;}
*,*::before,*::after{box-sizing:border-box;}
body{margin:0;font-family:"Noto Sans KR",-apple-system,sans-serif;font-size:14px;line-height:1.5;color:var(--text-primary);background:var(--bg-page);min-height:100vh;}
.app-header{background:var(--bg-card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.app-header-inner{max-width:960px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;}
.brand-mark{width:32px;height:32px;background:var(--naver-green);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;}
.brand-text{display:flex;flex-direction:column;}
.brand-text strong{font-size:15px;font-weight:700;}
.brand-text span{font-size:12px;color:var(--text-secondary);}
.api-key-bar{display:flex;align-items:center;gap:8px;background:#f0fdf6;border:1px solid #b7f5d2;border-radius:var(--radius-sm);padding:6px 12px;flex:1;max-width:460px;}
.api-key-bar label{font-size:12px;font-weight:600;color:var(--naver-green-dark);white-space:nowrap;}
.api-key-bar input{flex:1;border:none;background:transparent;font-size:13px;font-family:monospace;outline:none;min-width:0;}
.header-actions{display:flex;align-items:center;gap:8px;}
.btn-ghost{padding:8px 14px;border:1px solid var(--border);background:#fff;border-radius:var(--radius-sm);font-size:13px;font-family:inherit;cursor:pointer;}
main{max-width:960px;margin:0 auto;padding:24px 24px 80px;}
.page-title{margin:0 0 8px;font-size:22px;font-weight:700;}
.page-desc{margin:0 0 24px;color:var(--text-secondary);font-size:13px;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#fafbfc 0%,#fff 100%);}
.card-header h2{margin:0;font-size:15px;font-weight:700;}
.card-header p{margin:4px 0 0;font-size:12px;color:var(--text-secondary);}
.card-body{padding:20px;}
.form-row{display:grid;grid-template-columns:160px 1fr;gap:16px 24px;align-items:start;margin-bottom:20px;}
.form-row:last-child{margin-bottom:0;}
label.field-label{font-size:13px;font-weight:600;padding-top:10px;}
.field-label .req{color:#e53e3e;margin-left:2px;}
.field-hint{font-size:12px;color:var(--text-secondary);margin-top:6px;}
input[type="text"],input[type="number"],select,textarea{width:100%;max-width:480px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text-primary);background:#fff;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--naver-green);box-shadow:0 0 0 3px var(--naver-green-soft);}
textarea{min-height:140px;resize:vertical;max-width:100%;}
.input-group{display:flex;align-items:center;gap:8px;max-width:480px;}
.input-group input{flex:1;max-width:none;}
.input-suffix{font-size:13px;color:var(--text-secondary);}
.product-name-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;max-width:100%;}
.product-name-row input[type="text"]{flex:1;min-width:200px;max-width:480px;}
.product-name-row .kream-link-wrap{margin:0;}
.kream-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--naver-green-dark);background:var(--naver-green-soft);border:1px solid var(--naver-green);border-radius:999px;text-decoration:none;white-space:nowrap;}
.kream-badge:hover{background:#d4f5e3;color:var(--naver-green-dark);}
.radio-group{display:flex;flex-wrap:wrap;gap:10px;}
.radio-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:#fff;}
.radio-pill input{accent-color:var(--naver-green);width:16px;height:16px;margin:0;}
.radio-pill:has(input:checked){border-color:var(--naver-green);background:var(--naver-green-soft);}
.file-upload{display:flex;flex-wrap:wrap;align-items:center;gap:12px;}
.file-upload input[type="file"]{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;}
.btn-upload{padding:10px 18px;background:#fff;border:1px dashed var(--naver-green);color:var(--naver-green-dark);border-radius:var(--radius-sm);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;}
.btn-upload:disabled{opacity:0.45;cursor:not-allowed;}
.file-name{font-size:13px;color:var(--text-secondary);}
.category-select-row{display:flex;flex-wrap:wrap;gap:10px;max-width:100%;}
.category-select-row select{flex:1;min-width:140px;max-width:220px;}
.image-preview-strip{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;}
.thumb-wrap{position:relative;width:88px;height:88px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);background:#f7f7f8;flex-shrink:0;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-remove{position:absolute;top:4px;right:4px;width:22px;height:22px;border:none;border-radius:50%;background:rgba(0,0,0,0.55);color:#fff;font-size:14px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;}
.thumb-idx{position:absolute;bottom:4px;left:4px;font-size:10px;font-weight:600;color:#fff;background:rgba(0,0,0,0.45);padding:2px 6px;border-radius:4px;}
.tags-preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#f0f1f3;border-radius:999px;font-size:12px;}
.tag-chip button{border:none;background:none;cursor:pointer;padding:0 0 0 4px;color:var(--text-secondary);font-size:14px;line-height:1;}
.btn-ai,.btn-autofill{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;}
.btn-ai{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;margin-bottom:8px;}
.btn-autofill{background:var(--naver-green);color:#fff;}
.btn-autofill:hover{background:var(--naver-green-dark);}
.btn-ai:disabled,.btn-autofill:disabled{opacity:0.55;cursor:not-allowed;}
.ai-status{font-size:12px;color:var(--text-secondary);margin-bottom:8px;min-height:18px;}
.ai-status.loading{color:#667eea;}
.ai-status.error{color:#e53e3e;}
.ai-status.success{color:var(--naver-green-dark);}
.footer-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border);padding:12px 24px;display:flex;justify-content:center;z-index:10;}
.footer-bar-inner{max-width:960px;width:100%;display:flex;justify-content:flex-end;gap:10px;}
.btn-primary{padding:12px 28px;background:var(--naver-green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-primary:hover{background:var(--naver-green-dark);}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <a href="#" class="brand">
      <span class="brand-mark">S</span>
      <span class="brand-text"><strong>스마트스토어</strong><span>판매자센터 · 상품 등록</span></span>
    </a>
    <div class="api-key-bar">
      <label for="claudeApiKey">Claude API Key</label>
      <input type="password" id="claudeApiKey" placeholder="sk-ant-..." autocomplete="off" />
    </div>
    <div class="header-actions"><button type="button" class="btn-ghost">미리보기</button></div>
  </div>
</header>

<main>
  <h1 class="page-title">상품 등록</h1>
  <p class="page-desc">필수 정보를 입력한 뒤 저장하기를 눌러 등록을 완료하세요.</p>

  <form id="productForm" novalidate>
    <section class="card">
      <div class="card-header"><h2>기본 정보</h2><p>상품의 핵심 정보를 입력합니다.</p></div>
      <div class="card-body">

        <div class="form-row">
          <span class="field-label">상품 이미지</span>
          <div>
            <div class="file-upload">
              <input type="file" id="imageInput" accept="image/*" multiple />
              <button type="button" class="btn-upload" id="btnPickImage">이미지 선택</button>
              <button type="button" class="btn-autofill" id="btnAutoFill" disabled>✨ AI로 상품정보 자동완성</button>
              <span class="file-name" id="fileName">0 / 5장</span>
            </div>
            <p class="ai-status" id="autoFillStatus"></p>
            <p class="field-hint">최대 5장, JPG/PNG · 첫 번째 이미지로 AI 분석</p>
            <div class="image-preview-strip" id="imagePreviewStrip"></div>
          </div>
        </div>

        <div class="form-row">
          <label class="field-label" for="productName">상품명<span class="req">*</span></label>
          <div>
            <div class="product-name-row">
              <input type="text" id="productName" placeholder="예) 나이키 에어맥스 270 DV1234-001" maxlength="100" required />
              <span id="kreamLinkWrap" class="kream-link-wrap"></span>
            </div>
            <p class="field-hint">쇼핑 검색에 노출될 상품명을 입력하세요.</p>
          </div>
        </div>

        <div class="form-row">
          <label class="field-label" for="price">판매가<span class="req">*</span></label>
          <div>
            <div class="input-group">
              <input type="number" id="price" placeholder="0" min="0" required />
              <span class="input-suffix">원</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <label class="field-label" for="stock">재고수량<span class="req">*</span></label>
          <div>
            <div class="input-group">
              <input type="number" id="stock" placeholder="0" min="0" required />
              <span class="input-suffix">개</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <span class="field-label">카테고리<span class="req">*</span></span>
          <div>
            <div class="category-select-row">
              <select id="catLarge"><option value="">대분류 선택</option></select>
              <select id="catMid" disabled><option value="">중분류 선택</option></select>
              <select id="catSmall" disabled><option value="">소분류 선택</option></select>
            </div>
            <p class="field-hint">대·중·소 순서로 선택하세요.</p>
          </div>
        </div>

        <div class="form-row">
          <span class="field-label">배송비<span class="req">*</span></span>
          <div>
            <div class="radio-group">
              <label class="radio-pill"><input type="radio" name="shipping" value="free" checked />무료배송</label>
              <label class="radio-pill"><input type="radio" name="shipping" value="paid" />유료배송</label>
            </div>
          </div>
        </div>

      </div>
    </section>

    <section class="card">
      <div class="card-header"><h2>상세 정보</h2><p>태그와 상품 설명을 입력합니다.</p></div>
      <div class="card-body">

        <div class="form-row">
          <label class="field-label" for="tagsInput">상품 태그</label>
          <div>
            <input type="text" id="tagsInput" placeholder="태그 입력 후 Enter" autocomplete="off" />
            <p class="field-hint">Enter로 태그를 추가하세요.</p>
            <div class="tags-preview" id="tagsPreview"></div>
            <input type="hidden" id="tagsHidden" />
          </div>
        </div>


        <div class="form-row">
          <label class="field-label" for="description">상품 설명<span class="req">*</span></label>
          <div>
            <button type="button" class="btn-ai" id="btnAiDesc">✨ AI 설명 생성</button>
            <p class="ai-status" id="aiStatus"></p>
            <textarea id="description" placeholder="상품 상세 정보, 사이즈 표, 교환·반품 안내 등" required></textarea>
          </div>
        </div>

      </div>
    </section>
  </form>
</main>

<div class="footer-bar">
  <div class="footer-bar-inner">
    <button type="submit" form="productForm" class="btn-primary">저장하기</button>
  </div>
</div>

<script>
(function () {
  var MAX = 5;
  var CAT = {
    패션의류: {
      남성의류: ["티셔츠","셔츠","바지","청바지","아우터","코트","패딩","후드티"],
      여성의류: ["티셔츠/탑","블라우스","바지","치마","원피스","아우터","코트","패딩"],
      스포츠의류: ["상의","하의","트레이닝복"]
    },
    패션잡화: {
      남성신발: ["스니커즈","구두/로퍼","샌들/슬리퍼","부츠"],
      여성신발: ["스니커즈","힐/펌프스","샌들/슬리퍼","부츠","플랫슈즈"],
      아동신발: ["운동화","샌들","슬리퍼"],
      가방: ["백팩","크로스백","토트백","숄더백"],
      모자: ["볼캡","버킷햇","비니"],
      "지갑/소품": ["반지갑","장지갑","카드지갑"]
    },
    "스포츠/레저": {
      스포츠용품: ["헬스용품","요가/필라테스","수영용품"],
      아웃도어: ["등산복","등산화","캠핑용품"]
    },
    "디지털/가전": {
      스마트폰: ["케이스/필름","충전기","이어폰"],
      컴퓨터: ["노트북","마우스","키보드"]
    },
    "생활/건강": {
      생활용품: ["청소용품","주방용품","욕실용품"],
      건강식품: ["비타민","프로틴"]
    },
    식품: {
      신선식품: ["과일","채소","정육/계란"],
      가공식품: ["라면/면류","과자/스낵","음료"]
    },
    뷰티: {
      스킨케어: ["세럼/앰플","크림","토너"],
      메이크업: ["립","아이","파운데이션"],
      헤어케어: ["샴푸","트리트먼트"]
    },
    "가구/인테리어": {
      가구: ["침대","소파","책상","의자"],
      조명: ["거실조명","침실조명"]
    }
  };

  function fillSel(el, ph, keys, dis) {
    el.innerHTML = "<option value=''>" + ph + "</option>";
    if (keys) keys.forEach(function (k) {
      var o = document.createElement("option");
      o.value = k; o.textContent = k; el.appendChild(o);
    });
    el.disabled = !!dis;
  }

  var cL = document.getElementById("catLarge");
  var cM = document.getElementById("catMid");
  var cS = document.getElementById("catSmall");
  fillSel(cL, "대분류 선택", Object.keys(CAT), false);

  cL.onchange = function () {
    var v = cL.value;
    if (!v) { fillSel(cM, "중분류 선택", null, true); fillSel(cS, "소분류 선택", null, true); }
    else { fillSel(cM, "중분류 선택", Object.keys(CAT[v]), false); fillSel(cS, "소분류 선택", null, true); }
  };
  cM.onchange = function () {
    var l = cL.value, m = cM.value;
    if (!l || !m) fillSel(cS, "소분류 선택", null, true);
    else fillSel(cS, "소분류 선택", CAT[l][m], false);
  };

  var tags = [];
  var tI = document.getElementById("tagsInput");
  var tP = document.getElementById("tagsPreview");
  var tH = document.getElementById("tagsHidden");

  function renderTags() {
    tP.innerHTML = "";
    tags.forEach(function (t, i) {
      var c = document.createElement("span"); c.className = "tag-chip"; c.textContent = t;
      var b = document.createElement("button"); b.type = "button"; b.textContent = "×";
      b.onclick = function () { tags.splice(i, 1); renderTags(); tH.value = tags.join(","); };
      c.appendChild(b); tP.appendChild(c);
    });
    tH.value = tags.join(",");
  }

  tI.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      var v = tI.value.trim();
      if (v && tags.indexOf(v) === -1) tags.push(v);
      tI.value = ""; renderTags();
    }
  });

  var iI = document.getElementById("imageInput");
  var bP = document.getElementById("btnPickImage");
  var bAF = document.getElementById("btnAutoFill");
  var afSt = document.getElementById("autoFillStatus");
  var fN = document.getElementById("fileName");
  var iPS = document.getElementById("imagePreviewStrip");
  var imgs = [];

  function updUI() {
    fN.textContent = imgs.length + " / " + MAX + "장";
    bP.disabled = imgs.length >= MAX;
    bAF.disabled = imgs.length === 0;
  }

  function renderImgs() {
    iPS.innerHTML = "";
    imgs.forEach(function (x, i) {
      var url = URL.createObjectURL(x.file);
      x.url = url;
      var w = document.createElement("div"); w.className = "thumb-wrap";
      var im = document.createElement("img"); im.src = url; im.alt = "이미지" + (i + 1);
      var rm = document.createElement("button"); rm.type = "button"; rm.className = "thumb-remove"; rm.textContent = "×";
      rm.onclick = function () { URL.revokeObjectURL(x.url); imgs.splice(i, 1); syncF(); renderImgs(); };
      var bd = document.createElement("span"); bd.className = "thumb-idx"; bd.textContent = String(i + 1);
      w.appendChild(im); w.appendChild(rm); w.appendChild(bd); iPS.appendChild(w);
    });
    updUI();
  }

  function syncF() {
    var dt = new DataTransfer();
    imgs.forEach(function (x) { dt.items.add(x.file); });
    iI.files = dt.files;
  }

  bP.onclick = function () { if (imgs.length < MAX) iI.click(); };

  iI.onchange = function () {
    var fs = Array.prototype.slice.call(iI.files || []);
    var al = MAX - imgs.length;
    for (var i = 0; i < fs.length && al > 0; i++) {
      if (fs[i].type.indexOf("image") === 0) { imgs.push({ file: fs[i] }); al--; }
    }
    syncF(); renderImgs(); iI.value = "";
  };

  updUI();

  var CAT_LARGE_ALIAS = { "스포츠레저": "스포츠/레저", "디지털가전": "디지털/가전", "생활건강": "생활/건강", "가구인테리어": "가구/인테리어" };
  var CAT_MID_ALIAS = { "지갑소품": "지갑/소품" };

  function fileToBase64(file) {
    return new Promise(function (resolve, reject) {
      var url = URL.createObjectURL(file);
      var img = new Image();
      img.onload = function () {
        URL.revokeObjectURL(url);
        var max = 1024;
        var w = img.naturalWidth;
        var h = img.naturalHeight;
        if (w > max || h > max) {
          if (w >= h) {
            h = Math.round(h * max / w);
            w = max;
          } else {
            w = Math.round(w * max / h);
            h = max;
          }
        }
        var canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.8).split(",")[1]);
      };
      img.onerror = function () {
        URL.revokeObjectURL(url);
        reject(new Error("이미지를 불러올 수 없습니다."));
      };
      img.src = url;
    });
  }

  function parseAiJson(text) {
    var s = (text || "").trim();
    var m = s.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (m) s = m[1].trim();
    return JSON.parse(s);
  }

  function showKreamLink(styleNumber) {
    var wrap = document.getElementById("kreamLinkWrap");
    wrap.innerHTML = "";
    var sn = (styleNumber || "").trim();
    if (!sn) return;
    var a = document.createElement("a");
    a.className = "kream-badge";
    a.href = "https://kream.co.kr/search?keyword=" + encodeURIComponent(sn);
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.textContent = "KREAM에서 가격확인 🔗";
    wrap.appendChild(a);
  }

  function setCategory(large, mid, small) {
    large = CAT_LARGE_ALIAS[large] || large;
    if (!CAT[large]) return;
    cL.value = large;
    fillSel(cM, "중분류 선택", Object.keys(CAT[large]), false);
    mid = CAT_MID_ALIAS[mid] || mid;
    if (!mid || !CAT[large][mid]) return;
    cM.value = mid;
    fillSel(cS, "소분류 선택", CAT[large][mid], false);
    if (small && CAT[large][mid].indexOf(small) !== -1) cS.value = small;
  }

  var AUTO_FILL_PROMPT =
    "이 상품 이미지를 분석해 스마트스토어 상품 등록 정보를 추론하세요. " +
    "반드시 아래 JSON 형식만 출력하고 다른 텍스트는 포함하지 마세요:\n" +
    '{"productName":"브랜드명 제품명 스타일넘버","styleNumber":"스타일넘버","price":0,"category":{"large":"대분류","mid":"중분류","small":"소분류"},"tags":["태그1","태그2"],"description":"설명"}\n\n' +
    "카테고리는 아래 목록에서만 선택하세요.\n" +
    "패션의류(남성의류/여성의류/스포츠의류), 패션잡화(남성신발/여성신발/아동신발/가방/모자/지갑소품), " +
    "스포츠/레저(스포츠용품/아웃도어), 디지털/가전(스마트폰/컴퓨터), 생활/건강(생활용품/건강식품), " +
    "식품(신선식품/가공식품), 뷰티(스킨케어/메이크업/헤어케어), 가구/인테리어(가구/조명)\n\n" +
    "productName은 브랜드명+제품명+스타일넘버 형식, styleNumber는 이미지에서 확인 가능한 모델/스타일 코드(없으면 빈 문자열), price는 원 단위 숫자, tags는 검색용 키워드 3~8개.\n" +
    "description은 반드시 아래 4개 섹션 제목을 포함해 한국어로 작성하세요:\n" +
    "🔥 셀링포인트: 이 제품의 핵심 특징과 구매해야 할 이유 3가지\n" +
    "👟 스타일 추천: 2025년 트렌드 기반 코디 방법 2~3가지\n" +
    "📏 사이즈 & 핏: 사이즈 팁, 핏감 안내(예: 트루투사이즈/한 사이즈 업 추천, 오버핏/슬림핏 등), 의류가 아닌 경우 사이즈 선택 가이드\n" +
    "📋 상품 스펙: 소재, 색상, 주요 사양\n\n" +
    "업로드된 모든 이미지를 분석해줘. 각 이미지에서 확인할 수 있는 정보(박스 라벨, 태그, 제품 외관, 색상, 소재, 스타일넘버 등)를 종합해서 상품 정보를 완성해줘. " +
    "스타일넘버가 어떤 이미지에서든 보이면 반드시 styleNumber에 넣어줘. 스타일넘버를 찾지 못했더라도 여러 이미지를 통해 확인된 제품의 색상, 소재, 디테일, 착용감 등을 description에 최대한 자세히 포함해줘.";

  var desc = document.getElementById("description");

  bAF.onclick = function () {
    var key = document.getElementById("claudeApiKey").value.trim();
    if (!key) { afSt.className = "ai-status error"; afSt.textContent = "API Key를 입력해주세요."; return; }
    if (!imgs.length) { afSt.className = "ai-status error"; afSt.textContent = "이미지를 먼저 업로드해주세요."; return; }

    bAF.disabled = true;
    afSt.className = "ai-status loading";
    afSt.textContent = "✨ AI가 이미지 " + imgs.length + "장을 분석 중입니다...";

    Promise.all(imgs.map(function (x) { return fileToBase64(x.file); }))
    .then(function (b64List) {
      var content = b64List.map(function (b64) {
        return { type: "image", source: { type: "base64", media_type: "image/jpeg", data: b64 } };
      });
      content.push({ type: "text", text: AUTO_FILL_PROMPT });
      return fetch("/api/claude", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          apiKey: key,
          payload: {
            model: "claude-haiku-4-5",
            max_tokens: 3072,
            messages: [{ role: "user", content: content }]
          }
        })
      });
    })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d.error) throw new Error(d.error.message || String(d.error));
      var raw = d.content && d.content[0] && d.content[0].text;
      if (!raw) throw new Error("응답이 비어 있습니다.");
      var data = parseAiJson(raw);
      if (data.productName) document.getElementById("productName").value = data.productName;
      showKreamLink(data.styleNumber);
      if (data.price != null) document.getElementById("price").value = data.price;
      if (data.category) setCategory(data.category.large, data.category.mid, data.category.small);
      if (Array.isArray(data.tags)) {
        tags = data.tags.filter(function (t) { return typeof t === "string" && t.trim(); });
        renderTags();
      }
      if (data.description) desc.value = data.description;
      afSt.className = "ai-status success";
      afSt.textContent = "✅ 상품정보가 자동완성되었습니다. 확인 후 수정하세요.";
    })
    .catch(function (e) {
      afSt.className = "ai-status error";
      afSt.textContent = "오류: " + e.message;
    })
    .finally(function () { updUI(); });
  };

  var btnAI = document.getElementById("btnAiDesc");
  var aiSt = document.getElementById("aiStatus");

  btnAI.onclick = function () {
    var key = document.getElementById("claudeApiKey").value.trim();
    if (!key) { aiSt.className = "ai-status error"; aiSt.textContent = "API Key를 입력해주세요."; return; }
    var pn = document.getElementById("productName").value.trim();
    if (!pn) { aiSt.className = "ai-status error"; aiSt.textContent = "상품명을 먼저 입력해주세요."; return; }

    var pr = document.getElementById("price").value;
    var prompt = "스마트스토어 상품 등록을 위한 매력적인 상품 설명을 한국어로 작성해주세요.\n\n상품명: " + pn + "\n";
    if (pr) prompt += "판매가: " + Number(pr).toLocaleString() + "원\n";
    if (cL.value && cM.value && cS.value) prompt += "카테고리: " + cL.value + " > " + cM.value + " > " + cS.value + "\n";
    if (tags.length) prompt += "태그: " + tags.join(", ") + "\n";
    prompt += "\n상품 특징, 소재/사양, 사이즈, 교환·반품 안내를 포함하여 이모지를 사용해 읽기 쉽게 작성해주세요.";

    btnAI.disabled = true;
    aiSt.className = "ai-status loading";
    aiSt.textContent = "✨ AI가 설명을 생성 중입니다...";

    fetch("/api/claude", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        apiKey: key,
        payload: {
          model: "claude-haiku-4-5",
          max_tokens: 1024,
          messages: [{ role: "user", content: prompt }]
        }
      })
    })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d.error) {
        aiSt.className = "ai-status error";
        aiSt.textContent = "오류: " + (d.error.message || d.error);
      } else {
        var t = d.content && d.content[0] && d.content[0].text;
        if (t) { desc.value = t; aiSt.className = "ai-status success"; aiSt.textContent = "✅ 완료! 필요하면 수정하세요."; }
      }
    })
    .catch(function (e) { aiSt.className = "ai-status error"; aiSt.textContent = "오류: " + e.message; })
    .finally(function () { btnAI.disabled = false; });
  };

  document.getElementById("productForm").onsubmit = function (e) {
    e.preventDefault();
    alert("저장되었습니다!");
  };
})();
</script>

</body>
</html>
